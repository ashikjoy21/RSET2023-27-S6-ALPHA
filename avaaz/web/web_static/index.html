<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avaaz - ISL Video Communicator</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e9;
        --surface: #fffaf2;
        --surface-2: #f8efde;
        --line: #dccab0;
        --text: #2f2420;
        --muted: #6e5a53;
        --red: #7d2928;
        --red-soft: #a7413e;
        --navy: #1f3759;
        --ok-bg: #e5f6ea;
        --ok-fg: #0f5f2d;
        --warn-bg: #fff0dd;
        --warn-fg: #8a4c10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 6%, #fff8ed 0%, rgba(255, 248, 237, 0) 42%),
          radial-gradient(circle at 85% -4%, #f0ddd0 0%, rgba(240, 221, 208, 0) 42%),
          var(--bg);
      }

      .app {
        max-width: 1280px;
        margin: 0 auto;
        padding: 14px;
        display: grid;
        gap: 10px;
      }

      .hero {
        border: 1px solid var(--line);
        background: linear-gradient(145deg, var(--surface) 0%, var(--surface-2) 100%);
        border-radius: 22px;
        padding: 12px 14px;
        box-shadow: 0 18px 36px rgba(52, 25, 10, 0.08);
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .chip {
        border: 1px solid #d6b9a8;
        background: #fff1e7;
        color: var(--red);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        padding: 6px 11px;
      }

      .status-pill {
        border: 1px solid #d6b9a8;
        background: #fff3ea;
        color: var(--red);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 11px;
      }

      .hero-center {
        margin-top: 6px;
        display: grid;
        justify-items: center;
        gap: 5px;
      }

      .hero-logo {
        width: clamp(92px, 14vw, 150px);
        height: auto;
      }

      .wordmark {
        margin: 0;
        font-size: clamp(46px, 9vw, 110px);
        line-height: 0.88;
        letter-spacing: 0.6px;
        font-weight: 900;
        color: var(--red);
      }

      .hero-copy {
        margin: 0;
        color: var(--muted);
        text-align: center;
        max-width: 720px;
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
        gap: 10px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface);
        box-shadow: 0 12px 28px rgba(52, 25, 10, 0.08);
        padding: 12px;
        display: grid;
        gap: 8px;
      }

      .panel-title {
        margin: 0;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: #5e433a;
      }

      .notice {
        margin: 0;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px dashed #cfbaa0;
        background: #fff6ec;
        color: #5f4a42;
        font-size: 12px;
        line-height: 1.4;
      }

      .field {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fffcf8;
        padding: 10px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        min-height: 88px;
        resize: vertical;
        border: 1px solid #dfceba;
        border-radius: 10px;
        background: #fffdfa;
        color: var(--text);
        padding: 10px 12px;
        font-size: 15px;
        outline: none;
      }

      textarea:focus {
        border-color: var(--red);
        box-shadow: 0 0 0 2px rgba(125, 41, 40, 0.15);
      }

      .button-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 11px 13px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        color: #fff8f5;
        background: var(--red);
      }

      button:hover {
        background: var(--red-soft);
      }

      button.secondary {
        background: #fff1e4;
        color: #6f352d;
        border: 1px solid #dcc2a9;
      }

      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fffdf9;
        padding: 9px;
      }

      .stat-k {
        margin: 0;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .stat-v {
        margin: 6px 0 0;
        font-size: 13px;
        font-weight: 700;
        color: var(--navy);
      }

      .stat-v.ok {
        color: var(--ok-fg);
        background: var(--ok-bg);
        border-radius: 8px;
        padding: 4px 7px;
        display: inline-block;
      }

      .stat-v.warn {
        color: var(--warn-fg);
        background: var(--warn-bg);
        border-radius: 8px;
        padding: 4px 7px;
        display: inline-block;
      }

      .video-box {
        border: 1px solid #d2bfaa;
        border-radius: 12px;
        background: #efe0cf;
        padding: 8px;
      }

      .player-wrap {
        border-radius: 11px;
        overflow: hidden;
        border: 1px solid #cdb8a0;
      }

      video {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 9;
      }

      .log-feed {
        border: 1px solid #ddcab1;
        border-radius: 12px;
        background: #fffaf3;
        max-height: 320px;
        overflow: auto;
        padding: 8px;
        display: grid;
        gap: 8px;
      }

      .log-item {
        border: 1px solid #e4d4bf;
        border-radius: 10px;
        background: #fffefb;
        padding: 8px;
      }

      .log-meta {
        margin: 0;
        font-size: 11px;
        color: var(--muted);
      }

      .log-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .log-title {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        color: #51352d;
      }

      .log-badge {
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 11px;
        font-weight: 700;
      }

      .log-badge.info {
        background: #e8eefc;
        color: #26468e;
      }

      .log-badge.success {
        background: #e5f6ea;
        color: #1c6a38;
      }

      .log-badge.warn {
        background: #fff0dd;
        color: #8a4c10;
      }

      .log-badge.error {
        background: #fde8e8;
        color: #9b1c1c;
      }

      .log-grid {
        display: grid;
        gap: 5px;
      }

      .log-row {
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        color: #4f3129;
      }

      .log-key {
        font-weight: 700;
        color: #6f4a3d;
      }

      .log-raw {
        margin-top: 6px;
      }

      .log-raw > summary {
        cursor: pointer;
        font-size: 11px;
        color: #76584f;
      }

      .log-item pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 11px;
        line-height: 1.42;
        color: #4f3129;
        margin-top: 6px;
      }

      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="hero">
        <div class="hero-top">
          <span class="chip">Avaaz Studio</span>
          <span class="status-pill" id="status">Idle</span>
        </div>
        <div class="hero-center">
          <svg class="hero-logo" viewBox="0 0 240 170" fill="none" aria-hidden="true">
            <path
              d="M24 80C24 47 50 22 83 22H118C151 22 177 47 177 80C177 113 151 138 118 138H82L63 154L65 136C42 128 24 107 24 80Z"
              stroke="#1f3759"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M36 88C36 58 60 35 90 35H118C148 35 172 58 172 88"
              stroke="#b15a55"
              stroke-width="4"
              stroke-linecap="round"
            />
            <path
              d="M95 116L93 86C92 77 99 70 108 70C117 70 123 76 124 85L125 113"
              stroke="#1f3759"
              stroke-width="8"
              stroke-linecap="round"
            />
            <path
              d="M118 115L116 75C115 66 122 58 131 58C140 58 146 66 147 75L149 112"
              stroke="#1f3759"
              stroke-width="8"
              stroke-linecap="round"
            />
            <path
              d="M142 116L140 67C139 58 146 50 155 50C164 50 170 58 171 67L173 112"
              stroke="#1f3759"
              stroke-width="8"
              stroke-linecap="round"
            />
            <path
              d="M166 120L163 60C162 51 169 43 178 43C187 43 193 51 194 60L197 111"
              stroke="#1f3759"
              stroke-width="8"
              stroke-linecap="round"
            />
            <path
              d="M170 66C171 55 178 48 186 48C195 48 201 55 202 64L204 98"
              stroke="#b15a55"
              stroke-width="6"
              stroke-linecap="round"
            />
          </svg>
          <h1 class="wordmark">Avaaz</h1>
          <p class="hero-copy">
           
          </p>
        </div>
      </section>

      <section class="grid">
        <section class="panel">
          <h2 class="panel-title">Compose and Control</h2>
          <p class="notice">
            Deaf-first flow: all state changes appear in text below. No audio cues are
            required.
          </p>

          <div class="status-grid">
            <div class="stat">
              <p class="stat-k">Live Mode</p>
              <p class="stat-v warn" id="liveModeText">OFF</p>
            </div>
            <div class="stat">
              <p class="stat-k">Playback</p>
              <p class="stat-v" id="playbackText">Idle</p>
            </div>
          </div>

          <div class="field">
            <label>English text (optional)</label>
            <textarea
              id="english"
              placeholder="Example: What is your name?"
            ></textarea>
          </div>

          <div class="field">
            <label>Gloss tokens (space-separated)</label>
            <textarea
              id="gloss"
              placeholder="Example: YOUR NAME WHAT"
            ></textarea>
          </div>

          <div class="field">
            <label>Actions</label>
            <div class="button-grid">
              <button id="btnGlossPlay">Gloss + Play</button>
              <button id="btnPlay" class="secondary">Play Gloss</button>
              <button id="btnLive" class="secondary">Live: Start</button>
              <button id="btnStop" class="secondary">Stop</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2 class="panel-title">Preview and Visual Feed</h2>
          <div class="video-box">
            <div class="player-wrap">
              <video id="player" controls></video>
            </div>
          </div>
          <div class="field">
            <label>Event feed</label>
            <div id="out" class="log-feed"></div>
          </div>
        </section>
      </section>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const englishEl = document.getElementById("english");
      const glossEl = document.getElementById("gloss");
      const outEl = document.getElementById("out");
      const player = document.getElementById("player");
      const btnGlossPlay = document.getElementById("btnGlossPlay");
      const btnPlay = document.getElementById("btnPlay");
      const btnLive = document.getElementById("btnLive");
      const btnStop = document.getElementById("btnStop");
      const liveModeTextEl = document.getElementById("liveModeText");
      const playbackTextEl = document.getElementById("playbackText");

      let queue = [];
      let queueIdx = 0;
      let liveTimer = null;
      let lastEventId = 0;

      function setStatus(s) {
        statusEl.textContent = s;
        if (playbackTextEl) playbackTextEl.textContent = s;
      }

      function setLiveMode(on) {
        if (!liveModeTextEl) return;
        liveModeTextEl.textContent = on ? "ON" : "OFF";
        liveModeTextEl.classList.remove("ok", "warn");
        liveModeTextEl.classList.add(on ? "ok" : "warn");
      }

      function log(obj) {
        const parsed = parseLogPayload(obj);
        const entry = document.createElement("div");
        entry.className = "log-item";

        const head = document.createElement("div");
        head.className = "log-head";

        const title = document.createElement("p");
        title.className = "log-title";
        title.textContent = parsed.title;

        const meta = document.createElement("p");
        meta.className = "log-meta";
        meta.textContent = new Date().toLocaleTimeString();

        const badge = document.createElement("span");
        badge.className = `log-badge ${parsed.level}`;
        badge.textContent = parsed.badge;

        const left = document.createElement("div");
        left.appendChild(title);
        left.appendChild(meta);
        head.appendChild(left);
        head.appendChild(badge);

        const body = document.createElement("div");
        body.className = "log-grid";
        for (const row of parsed.rows) {
          const p = document.createElement("p");
          p.className = "log-row";

          const k = document.createElement("span");
          k.className = "log-key";
          k.textContent = `${row.key}: `;

          const v = document.createElement("span");
          v.textContent = row.value;

          p.appendChild(k);
          p.appendChild(v);
          body.appendChild(p);
        }

        const rawWrap = document.createElement("details");
        rawWrap.className = "log-raw";
        const summary = document.createElement("summary");
        summary.textContent = "Show raw payload";
        const pre = document.createElement("pre");
        pre.textContent = parsed.raw;
        rawWrap.appendChild(summary);
        rawWrap.appendChild(pre);

        entry.appendChild(head);
        entry.appendChild(body);
        entry.appendChild(rawWrap);
        outEl.prepend(entry);

        // Keep feed readable by limiting number of cards.
        while (outEl.children.length > 30) {
          outEl.removeChild(outEl.lastChild);
        }
      }

      function formatValue(v) {
        if (Array.isArray(v)) return v.length ? v.join(" • ") : "-";
        if (v === null || v === undefined || v === "") return "-";
        if (typeof v === "object") return JSON.stringify(v);
        return String(v);
      }

      function parseLogPayload(obj) {
        const raw = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
        if (typeof obj === "string") {
          return {
            title: "Message",
            badge: "Info",
            level: "info",
            rows: [{ key: "Text", value: obj }],
            raw,
          };
        }

        if (obj?.health) {
          return {
            title: "System Health",
            badge: obj.health.ok ? "Healthy" : "Check",
            level: obj.health.ok ? "success" : "warn",
            rows: [
              { key: "Lexicon entries", value: formatValue(obj.health.lexicon_entries) },
              { key: "Video directory", value: obj.health.video_dir_exists ? "Available" : "Missing" },
            ],
            raw,
          };
        }

        if (obj?.live_event) {
          const e = obj.live_event;
          return {
            title: "Live ASR Event",
            badge: "Live",
            level: "success",
            rows: [
              { key: "Transcript", value: formatValue(e.transcript) },
              { key: "Gloss", value: formatValue(e.gloss_tokens) },
              { key: "Videos", value: formatValue((e.video_urls || []).length) },
              { key: "Missing", value: formatValue(e.missing) },
            ],
            raw,
          };
        }

        if (obj?.warning) {
          return {
            title: "Mapping Warning",
            badge: "Warning",
            level: "warn",
            rows: [{ key: "Missing tokens", value: formatValue(obj.missing) }],
            raw,
          };
        }

        if (obj?.video_urls || obj?.missing) {
          return {
            title: "Video Mapping",
            badge: obj.missing?.length ? "Partial" : "Ready",
            level: obj.missing?.length ? "warn" : "success",
            rows: [
              { key: "Videos mapped", value: formatValue((obj.video_urls || []).length) },
              { key: "Missing tokens", value: formatValue(obj.missing) },
            ],
            raw,
          };
        }

        if (obj?.gloss_tokens) {
          return {
            title: "Gloss Result",
            badge: "Gloss",
            level: "info",
            rows: [
              { key: "Gloss", value: formatValue(obj.gloss_tokens) },
              { key: "Confidence", value: formatValue(obj.meta?.confidence) },
            ],
            raw,
          };
        }

        return {
          title: "Event",
          badge: "Info",
          level: "info",
          rows: [{ key: "Details", value: raw }],
          raw,
        };
      }

      function tokenizeGloss(s) {
        return s
          .split(/\s+/)
          .map((t) => t.trim())
          .filter(Boolean)
          .map((t) => t.toUpperCase());
      }

      function letterFallbackUrls(tokens) {
        const urls = [];
        for (const raw of tokens || []) {
          const token = String(raw || "").trim().toUpperCase();
          // Only fingerspell unknown alphabetic words (names/places).
          if (!/^[A-Z]{2,}$/.test(token)) continue;
          for (const ch of token) {
            urls.push(`/videos/${encodeURIComponent(ch + ".mp4")}`);
          }
        }
        return urls;
      }

      async function fetchGloss(text) {
        const res = await fetch("/api/gloss", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error("Failed /api/gloss");
        return await res.json();
      }

      async function fetchSequence(glossTokens) {
        const res = await fetch("/api/sequence", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ gloss_tokens: glossTokens }),
        });
        if (!res.ok) throw new Error("Failed /api/sequence");
        return await res.json();
      }

      async function fetchLatest() {
        const res = await fetch("/api/latest");
        if (!res.ok) throw new Error("Failed /api/latest");
        return await res.json();
      }

      async function primeLiveBaseline() {
        // Avoid replaying the last stored event when Live starts/restarts.
        try {
          const latest = await fetchLatest();
          lastEventId = latest.id || 0;
        } catch {
          // If server is temporarily unavailable, keep existing baseline.
        }
      }

      function playQueue(urls) {
        queue = urls;
        queueIdx = 0;
        if (!queue.length) {
          setStatus("No videos");
          return;
        }
        setStatus("Playing…");
        player.src = queue[0];
        player.play().catch(() => {});
      }

      player.addEventListener("ended", () => {
        if (!queue.length) return;
        queueIdx += 1;
        if (queueIdx >= queue.length) {
          setStatus("Done");
          return;
        }
        player.src = queue[queueIdx];
        player.play().catch(() => {});
      });

      async function stopAsrEngine() {
        try {
          await fetch("/api/asr_control", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ state: "stopped" }),
          });
        } catch {
          // If control endpoint is unavailable, just ignore – UI still stops playback.
        }
      }

      btnStop.addEventListener("click", () => {
        queue = [];
        queueIdx = 0;
        player.pause();
        player.removeAttribute("src");
        player.load();

        // Also stop live polling if it's running
        if (liveTimer) {
          clearInterval(liveTimer);
          liveTimer = null;
        }
        btnLive.textContent = "Live: Start";
        setLiveMode(false);

        stopAsrEngine();
        setStatus("Stopped");
      });

      btnLive.addEventListener("click", async () => {
        if (liveTimer) {
          clearInterval(liveTimer);
          liveTimer = null;
          btnLive.textContent = "Live: Start";
          setStatus("Live stopped");
          setLiveMode(false);
          // Also ask backend ASR engine to stop after current utterance.
          stopAsrEngine();
          return;
        }

        btnLive.textContent = "Live: Stop";
        setStatus("Live polling…");
        setLiveMode(true);
        await primeLiveBaseline();

        liveTimer = setInterval(async () => {
          try {
            const latest = await fetchLatest();
            const id = latest.id || 0;
            if (!id || id === lastEventId) return;
            lastEventId = id;

            if (latest.transcript) englishEl.value = latest.transcript;
            if (Array.isArray(latest.gloss_tokens)) {
              glossEl.value = latest.gloss_tokens.join(" ");
            }
            log({ live_event: latest });

            if (latest.missing?.length) {
              log({ warning: "Missing tokens", missing: latest.missing });
            }

            const fallback = letterFallbackUrls(latest.missing || []);
            playQueue([...(latest.video_urls || []), ...fallback]);
          } catch (e) {
            setStatus("Live error");
            log(String(e));
          }
        }, 700);
      });

      btnPlay.addEventListener("click", async () => {
        try {
          setStatus("Mapping…");
          const glossTokens = tokenizeGloss(glossEl.value);
          const seq = await fetchSequence(glossTokens);
          log(seq);
          if (seq.missing?.length) {
            log({ warning: "Missing tokens", missing: seq.missing });
          }
          const fallback = letterFallbackUrls(seq.missing || []);
          playQueue([...(seq.video_urls || []), ...fallback]);
        } catch (e) {
          setStatus("Error");
          log(String(e));
        }
      });

      btnGlossPlay.addEventListener("click", async () => {
        try {
          const text = englishEl.value.trim();
          if (!text) {
            log("Enter English text first, or use Play Gloss.");
            return;
          }
          setStatus("Glossing…");
          const gloss = await fetchGloss(text);
          log(gloss);
          const tokens = gloss.gloss_tokens || [];
          glossEl.value = tokens.join(" ");
          setStatus("Mapping…");
          const seq = await fetchSequence(tokens);
          log(seq);
          if (seq.missing?.length) {
            log({ warning: "Missing tokens", missing: seq.missing });
          }
          const fallback = letterFallbackUrls(seq.missing || []);
          playQueue([...(seq.video_urls || []), ...fallback]);
        } catch (e) {
          setStatus("Error");
          log(String(e));
        }
      });

      // Initial state
      setLiveMode(false);
      log("Ready.");

      // Quick sanity check
      fetch("/health")
        .then((r) => r.json())
        .then((j) => log({ health: j }))
        .catch(() => {});
    </script>
  </body>
</html>
